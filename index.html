<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tea House</title>
    <!-- tailwindCSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fontAwesome -->
    <script
      src="https://kit.fontawesome.com/14d25571fc.js"
      crossorigin="anonymous"
    ></script>
    <!-- CSS -->
    <link rel="stylesheet" href="styles/style.css" />
  </head>

  <body class="w-3/4 container mx-auto manrope_font">
    <!-- Banner Section -->
    <section id="banner" class="gap-1 flex justify-around mt-14">
      <div class="content w-1/2">
        <h1 class="font-extrabold text-7xl/22 text-neutral-900">
          It's good tea time at The Tea House
        </h1>
        <p class="text-xl text-neutral-500 mt-7">
          Tea and Botanical Solutions Supplier Give Optimum Satisfaction To Your
          Taste Buds.
        </p>
        <button
          class="py-4 px-10 bg-linear-to-r from-orange-500 to-red-500 text-white font-bold text-lg mt-7 rounded-md flex justify-between"
        >
          Explore More
          <i class="fa-solid fa-arrow-up-right-from-square text-white p-1"></i>
        </button>
      </div>

      <div class="img-section w-1/2">
        <img
          src="images/banner.png"
          alt="tea photo"
          srcset=""
          class="relative"
        />

        <!-- rating box -->
        <div
          class="rating-box bg-white w-50 rounded-lg flex justify-center items-center p-3 shadow-lg absolute top-90 right-100"
        >
          <i class="fa-solid fa-star text-yellow-400 text-3xl"></i>
          <div class="ml-1 content">
            <h5 class="font-bold text-xl">5.00</h5>
            <p>Trust Pilot Ratings</p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
